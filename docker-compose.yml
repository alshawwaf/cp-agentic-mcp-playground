      timeout: 5s
      retries: 18
      start_period: 20s
    restart: unless-stopped

  # ──────────────── Agent-builder import (Flowise + Langflow) ────────────────
  # One-shot importer, parity with n8n-import: every deploy seeds the committed
  # integrations/ flows into the RUNNING builders, idempotently (a same-named
  # flow is never imported twice; an unparseable flow list refuses to import
  # rather than duplicate). No manual API keys needed: Flowise authenticates
  # with the stack admin account (its first-setup account uses the same creds)
  # and Langflow with its provisioned superuser — set FLOWISE_API_KEY /
  # LANGFLOW_API_KEY in .env only to override. The script waits for each
  # builder itself, so plain start-order dependencies are enough.
  builders-import:
    image: python:3.12-alpine
    container_name: builders-import
    networks: [ "demo" ]
    depends_on:
      - flowise
      - langflow
    volumes:
      - ./integrations:/integrations:ro
    environment:
      - FLOWISE_URL=http://flowise:${FLOWISE_PORT:-3020}
      - LANGFLOW_URL=http://langflow:7860
      - ADMIN_EMAIL=${N8N_ADMIN_EMAIL}
      - ADMIN_PASSWORD=${N8N_ADMIN_PASSWORD}
      - FLOWISE_API_KEY=${FLOWISE_API_KEY:-}
      - LANGFLOW_API_KEY=${LANGFLOW_API_KEY:-}
      # Same default as the mcp-gateway service, so the imported agent authenticates out of the box.
      - MCP_GATEWAY_TOKEN=${MCP_GATEWAY_TOKEN:-cp-mcp-gateway-training-token}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
      # Credential catalogue + Langfuse analytics + LiteLLM-routed Langflow flows:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3000}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-cp-litellm-training-key}
      # External MCP agents (DevHub / PolicyPilot): endpoint domain + bearer tokens.
      # DOMAIN falls back to N8N_HOST minus the n8n. prefix inside the script.
      - DOMAIN=${DOMAIN:-}
      - N8N_HOST=${N8N_HOST:-}
      - DEVHUB_MCP_TOKEN=${DEVHUB_MCP_TOKEN:-}
      - PILOT_MCP_TOKEN=${PILOT_MCP_TOKEN:-}
    entrypoint: [ "python3", "/integrations/seed_builders.py" ]
    restart: "no"

  # ──────────────── LiteLLM proxy (n8n + Langflow → Langfuse tracing) ────────────────
  # Internal-only OpenAI-compatible proxy (demo network, no host port). n8n's
  # OpenAI/Azure credentials and every Langflow flow's OpenAI model point here;
  # LiteLLM forwards to the real provider with the server-side keys below and
  # logs every request/response pair to Langfuse. This is what makes n8n and
  # Langflow visible in Langfuse — neither has a native callback that works
  # against the lean Langfuse v2 server (Langflow 1.10 bundles langfuse SDK v3,
  # which requires a v3 server). Flowise traces natively instead (per-chatflow
  # analytics, richer agent spans) and does NOT route through this proxy.
  # Auth: clients send LITELLM_MASTER_KEY; the training default mirrors the
  # MCP_GATEWAY_TOKEN pattern and is overridden by the installer bootstrap.
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.66.0-stable
    pull_policy: missing
    container_name: litellm
    networks: [ "demo" ]
    volumes:
      - ./integrations/observability/litellm_config.yaml:/etc/litellm/config.yaml:ro
    command: [ "--config", "/etc/litellm/config.yaml", "--port", "4000" ]
    environment:
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3000}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-cp-litellm-training-key}
    restart: unless-stopped

  # ──────────────── Qdrant (vector DB for RAG) ────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    pull_policy: missing
    container_name: qdrant
    networks: [ "demo" ]
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      # Qdrant treats an EMPTY QDRANT__SERVICE__API_KEY as "auth on with an empty
      # key" (rejects unauthenticated requests with 401), so we do NOT pass it when
      # blank. Internal-only on the demo net = no auth by default. To require a key,
      # set QDRANT_API_KEY in .env AND uncomment the line below (the ingester +
      # retriever already send it as the api-key header when QDRANT_API_KEY is set).
      # - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
      - QDRANT__TELEMETRY_DISABLED=true
    healthcheck:
      # Qdrant has no shell/curl; TCP-probe the REST port from the Python base image is done
      # by dependents. This lightweight check keeps depends_on: service_healthy usable.
      test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 20

  # ──────────────── Visible RAG — one-shot corpus ingester ────────────────
  rag-ingest:
    image: python:3.12-alpine
    pull_policy: missing
    container_name: rag-ingest
    networks: [ "demo" ]
    restart: "no"
    working_dir: /app
    # ingest.py is STDLIB-only (urllib) — nothing to pip install.
    volumes:
      - ./integrations/rag-cp-docs:/app:ro
    environment:
      - OLLAMA_URL=http://ollama-cpu:11434
      - QDRANT_URL=http://qdrant:6333
      - EMBED_MODEL=nomic-embed-text
      - COLLECTION=cp_docs
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    command: [ "python3", "ingest.py" ]
    depends_on:
      qdrant:
        condition: service_healthy
      ollama-cpu:
        condition: service_healthy

  # One-shot eval run (parity with builders-import): on `docker compose up` it
  # POSTs the evals_cases.json cases to each agent's n8n chat webhook, scores the
  # answers, and writes evals_report.md/.json to ./n8n/shared. Exit code is 0 if
  # every case passes, 1 otherwise. Purely opt-in — start it explicitly with
  # `docker compose up evals-run`; it never blocks the rest of the stack.
  evals-run:
    image: python:3.12-alpine
    container_name: evals-run
    networks: [ "demo" ]
    depends_on:
      - n8n
    volumes:
      - ./integrations:/integrations:ro
      - ./n8n/shared:/out
    environment:
      # Inside the network n8n is reachable by service name; override to a public
      # host (e.g. https://n8n.${YOUR_DOMAIN}) to eval a remote deployment.
      - BASE_URL=${EVALS_BASE_URL:-http://n8n:5678}
      - CASES_FILE=/integrations/evals/evals_cases.json
      - OUT_DIR=/out
      - TIMEOUT=120
    entrypoint: [ "python3", "/integrations/evals/run_evals.py" ]
    restart: "no"

  # ──────────────── AI-Infra-Guard (AI Red Teaming Platform) ────────────────
  # Tencent Zhuque Lab - AI infrastructure vuln scanning, MCP security
  # analysis, and jailbreak evaluation. Web UI at port 8088.
  # https://github.com/Tencent/AI-Infra-Guard
  aig-webserver:
    build:
      context: https://github.com/Tencent/AI-Infra-Guard.git
      dockerfile: Dockerfile
    container_name: aig-webserver
    networks: [ "demo", "dokploy-network" ]
    restart: unless-stopped
    environment:
      - AIG_ENV=production
      - AIG_UPLOAD_DIR=/app/uploads
      - AIG_DB_PATH=/app/database
      - TZ=UTC
    volumes:
      - aig_data:/app/data
      - aig_db:/app/database
      - aig_logs:/app/logs
      - aig_uploads:/app/uploads
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8088/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      # Two explicit routers (same pattern as PolicyPilot): the Cloudflare tunnel fronts every
      # host to entrypoint web (:80), and a router carrying TLS config never matches plain HTTP —
      # Traefik 3.6 splits a web,websecure router and propagates certresolver onto BOTH, so the
      # single-router form 404s through the tunnel.
      - "traefik.http.routers.aig-web.rule=Host(`aig.{{DOMAIN}}`)"
      - "traefik.http.routers.aig-web.entrypoints=web"
      - "traefik.http.routers.aig-web.service=aig-svc"
      - "traefik.http.routers.aig-websecure.rule=Host(`aig.{{DOMAIN}}`)"
      - "traefik.http.routers.aig-websecure.entrypoints=websecure"
      - "traefik.http.routers.aig-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.aig-websecure.service=aig-svc"
      - "traefik.http.services.aig-svc.loadbalancer.server.port=8088"
      - "traefik.docker.network=dokploy-network"

  aig-agent:
    build:
      context: https://github.com/Tencent/AI-Infra-Guard.git
      dockerfile: Dockerfile_Agent
    container_name: aig-agent
    networks: [ "demo" ]
    restart: unless-stopped
    environment:
      - AIG_SERVER=aig-webserver:8088
      - OPENROUTER_API_KEY=${AIG_LLM_API_KEY:-ollama}
      - DEFAULT_BASE_URL=${AIG_LLM_BASE_URL:-http://ollama-cpu:11434/v1}
      - DEFAULT_MODEL=${AIG_LLM_MODEL:-huihui_ai/deepseek-r1-abliterated:latest}
      - THINKING_MODEL=${AIG_LLM_MODEL:-huihui_ai/deepseek-r1-abliterated:latest}
      - CODING_MODEL=${AIG_LLM_MODEL:-huihui_ai/deepseek-r1-abliterated:latest}
      - FAST_MODEL=${AIG_LLM_MODEL:-huihui_ai/deepseek-r1-abliterated:latest}
    volumes:
      - ./aig/patches/llm.py:/app/mcp-scan/utils/llm.py:ro
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    shm_size: "2gb"
    depends_on:
      aig-webserver:
        condition: service_healthy

  # ──────────────── MCP Gateway (pilot) ────────────────
  # Aggregates the Check Point MCP sidecars behind one endpoint.
  # Internal-only on `demo`, consistent with the no-host-ports posture.
  mcp-gateway:
    image: docker/mcp-gateway@sha256:97ec61bc5f38416279069800fef58ac264c81c643a73a9698ceaec876a436e3f
    container_name: mcp-gateway
    networks: [ "demo" ]
    command:
      - "--transport=streaming"
      - "--port=8080"
      # catalog must live under ~/.docker/mcp/catalogs/ and be referenced by name
      - "--catalog=checkpoint-mcp.yaml"
      # a custom catalog does not auto-enable its servers; list them explicitly
      - "--servers=documentation,quantum-management,policy-insights,cpinfo-analysis,https-inspection,management-logs,gaia,gw-cli,reputation-service,threat-emulation,threat-prevention"
    environment:
      # required when running outside Docker Desktop (Dokploy / Docker CE)
      - DOCKER_MCP_IN_CONTAINER=1
      # sidecars are internal-network HTTP (not HTTPS); opt into insecure remote
      # MCP URLs. Safe here because traffic stays on the private `demo` network.
      - DOCKER_MCP_ALLOW_INSECURE_REMOTE_URLS=1
      # PIN the gateway Bearer token. Without this the gateway generates a NEW
      # random token on every restart, silently invalidating any client
      # credential (n8n) configured against the old one. Clients send:
      #   Authorization: Bearer <token>
      - MCP_GATEWAY_AUTH_TOKEN=${MCP_GATEWAY_TOKEN:-cp-mcp-gateway-training-token}
    volumes:
      - ./mcp-gateway/catalog.yaml:/root/.docker/mcp/catalogs/checkpoint-mcp.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    # service_healthy (not plain startup order): the gateway enumerates each
    # server's tools ONCE at startup. If a slow-booting sidecar isn't listening
    # yet, the gateway logs "Can't start <server>: connection refused" and runs
    # with 0 of its tools until manually restarted. The healthchecks make the
    # gateway start only after both sidecars accept connections.
    depends_on:
      mcp-documentation:
        condition: service_healthy
      mcp-quantum-management:
        condition: service_healthy
      policy-insights-mcp:
        condition: service_healthy
    # Surfaces a wedged gateway (e.g. it came up before a sidecar and enumerated
    # 0 tools) as 'unhealthy' in `docker ps`. The gateway image is a minimal Go
    # image with busybox nc (no node), so probe the port with nc.
    healthcheck:
      test: [ "CMD", "nc", "-z", "127.0.0.1", "8080" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─────────── Exercise: Build Your Own MCP Server (opt-in) ───────────
  # Zero-dependency, stdlib-only MCP server wrapping the CP IPS/CVE API. Behind
  # the `exercises` profile so it never starts with the default stack or CI.
  # Run: docker compose --profile exercises up -d --build ips-cve-mcp
  # See docs/guides/Build_Your_Own_MCP_Exercise.md.
  ips-cve-mcp:
    build:
      context: ./exercises/build-your-own-mcp
      dockerfile: Dockerfile
    image: ips-cve-mcp:exercise
    container_name: ips-cve-mcp
    profiles: [ "exercises" ]
    networks: [ "demo" ]
    environment:
      - IPS_CLIENT_ID=${IPS_CLIENT_ID}
      - IPS_ACCESS_KEY=${IPS_ACCESS_KEY}
      # optional region override (auth + service host must match); blank = global default
      - IPS_AUTH_URL=${IPS_AUTH_URL:-}
      - IPS_SERVICE_URL=${IPS_SERVICE_URL:-}
      - MCP_PORT=3013
    healthcheck:
      test: [ "CMD", "python3", "-c", "import socket; socket.create_connection(('127.0.0.1',3013),3)" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # ─────────── MCP Security Lab (opt-in, INTENTIONALLY VULNERABLE) ───────────
  # ☠️ A deliberately-unsafe MCP server used ONLY to teach MCP attack/defend
  # (tool poisoning, indirect prompt injection, over-permissioned tools,
  # rug-pull). Everything it does is SIMULATED and clearly labelled — no real
  # file reads, no exfiltration. Behind the `security-lab` profile so it NEVER
  # starts with the default stack or CI, and it publishes NO host port (internal
  # `demo` network only). Do not front a real workload with this.
  # Enable: COMPOSE_PROFILES=...,security-lab   (see integrations/mcp-security-lab/INTEGRATION.md)
  # Guide:  docs/guides/MCP_Security_Lab.md
  vuln-mcp:
    image: python:3.12-alpine
    container_name: vuln-mcp
    profiles: [ "security-lab" ]
    networks: [ "demo" ]
    working_dir: /app
    volumes:
      - ./integrations/mcp-security-lab:/app:ro
    environment:
      - MCP_PORT=3099
      # MCP_BEARER_TOKEN is intentionally left UNSET — the lab demonstrates a
      # direct, unauthenticated sidecar (contrast the gateway's mandatory Bearer).
    command: [ "python3", "/app/vuln_mcp_server.py" ]
    healthcheck:
      test: [ "CMD", "python3", "-c", "import socket; socket.create_connection(('127.0.0.1',3099),3)" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # ─────────── PolicyPilot MCP (opt-in, prereqs required) ───────────
  # PolicyPilot's own MCP server (guarded-WRITE: preview / approve / rollback)
  # fronted by the gateway. Behind the `policypilot` profile so it never starts
  # with the default stack or CI. RUNTIME PREREQS (see the guide): build the
  # PolicyPilot image (its `mcp` dep installs via Artifactory), and provide a DB
  # + PILOT_ENCRYPTION_KEY populated by the PolicyPilot portal (share its /data
  # volume) so its tools can decrypt saved SMS/gateway creds.
  # Enable: docs/guides/PolicyPilot_Gateway_Sidecar_Guide.md
  policypilot-mcp:
    image: ${POLICYPILOT_IMAGE:-policypilot:custom}
    container_name: policypilot-mcp
    profiles: [ "policypilot" ]
    networks: [ "demo" ]
    # init_db() is skipped by the standalone entrypoint — create tables first,
    # then run the Streamable-HTTP MCP server on 0.0.0.0 (default binds 127.0.0.1).
    entrypoint: [ "sh", "-c" ]
    command:
      - "python -c 'from app.db import init_db; init_db()' && python -m app.mcp_server"
    environment:
      # Required at runtime: PolicyPilot's standalone server exits without it.
      - PILOT_MCP_TOKEN=${PILOT_MCP_TOKEN:-}
      - PILOT_MCP_HOST=0.0.0.0
      - PILOT_MCP_PORT=3020
      - PILOT_DATABASE_URL=${PILOT_DATABASE_URL:-sqlite:////data/policypilot.db}
      - PILOT_ENCRYPTION_KEY=${PILOT_ENCRYPTION_KEY:-}
    volumes:
      - policypilot_data:/data
    healthcheck:
      test: [ "CMD", "sh", "-c", "python -c \"import socket; socket.create_connection(('127.0.0.1',3020),3)\"" ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
