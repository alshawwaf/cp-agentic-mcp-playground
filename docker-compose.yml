###############################################################################
# Multi-Service Stack
# - n8n (workflow automation)
# - PostgreSQL (n8n backend)
# - Ollama (local LLMs) CPU/GPU
# - Langflow (AI flow builder)
# - Open-WebUI (AI chat interface)
# - Flowise (LLM orchestration UI)
# - Qdrant (vector database)
# - AI-Infra-Guard (AI Red Teaming platform)
###############################################################################

###############################################################################
# Networks
###############################################################################
networks:
  demo:
  dokploy-network:
    external: true
    ###############################################################################
    # Volumes
    ###############################################################################
volumes:
  n8n_storage:
  postgres_storage:
  ollama_storage:
  open-webui:
  flowise:
  langflow:
  vllm_storage:
  aig_data:
  aig_db:
  aig_logs:
  aig_uploads:
  policypilot_data:   # PolicyPilot MCP sidecar DB (opt-in `policypilot` profile)
  qdrant_storage:     # Qdrant vector DB storage (RAG / rag-cp-docs)

    ###############################################################################
    # Common Service Definitions (Anchors)
    ###############################################################################

    # ──────────────── n8n Base ────────────────
x-n8n: &service-n8n
  image: n8nio/n8n:2.28.6
  networks: [ "demo" ]
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    # IMPORTANT for container-to-container curl
    - N8N_SECURE_COOKIE=false
    - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
    # we will ALSO call /rest/owner/setup in the provisioner with these:
    - N8N_USER_MANAGEMENT_EMAIL=${N8N_ADMIN_EMAIL}
    - N8N_USER_MANAGEMENT_FIRST_NAME=${N8N_ADMIN_FIRST_NAME}
    - N8N_USER_MANAGEMENT_LAST_NAME=${N8N_ADMIN_LAST_NAME}
    - N8N_USER_MANAGEMENT_PASSWORD=${N8N_ADMIN_PASSWORD}
    - N8N_USER_MANAGEMENT_DISABLED=false
    # basic auth (MUST match provisioner)
    - N8N_BASIC_AUTH_ACTIVE=true
    - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
    - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
    - WEBHOOK_URL=${WEBHOOK_URL}
    - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
    - N8N_PUSH_BACKEND=${N8N_PUSH_BACKEND}
    # allow community packages — no longer needed: every workflow now uses the
    # NATIVE MCP Client Tool node that ships with n8n. Re-enable only if a
    # future workflow needs a community node again.
    # - N8N_COMMUNITY_PACKAGES_ENABLED=true
    # - N8N_UNVERIFIED_PACKAGES_ENABLED=true
    # - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true

# ──────────────── Ollama Base ────────────────

x-ollama: &service-ollama
  image: ollama/ollama:0.31.1
  pull_policy: missing
  networks: [ "demo", "dokploy-network" ]
  restart: unless-stopped
  volumes:
    - ollama_storage:/root/.ollama
  # ensure the daemon is actually ready before dependents run
  healthcheck:
    test: [ "CMD-SHELL", "OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null 2>&1" ]
    interval: 5s
    timeout: 5s
    retries: 20

# ──────────────── Ollama Model Puller ────────────────
x-init-ollama: &init-ollama
  image: ollama/ollama:0.31.1
  pull_policy: missing
  networks: [ "demo" ]
  volumes:
    - ollama_storage:/root/.ollama
  entrypoint: /bin/sh
  command:
    - "-lc"
    - |
      echo "Waiting for Ollama @ $${OLLAMA_HOST} ..."
      # loop until the server responds
      until OLLAMA_HOST="$${OLLAMA_HOST}" ollama list >/dev/null 2>&1; do
        echo "  Ollama not ready yet..."
        sleep 3
      done
      # Model list comes from OLLAMA_MODELS in the env (comma-separated).
      MODELS="${OLLAMA_MODELS:-gemma4:e2b,qwen3.5:4b}"
      echo "Ollama is ready. Pulling: $${MODELS}"
      for m in $$(echo "$${MODELS}" | tr ',' ' '); do
        echo ">> pulling $${m}"
        OLLAMA_HOST="$${OLLAMA_HOST}" ollama pull "$${m}" || echo "WARN: pull failed for $${m} (continuing)"
      done
      echo "LLM Models pulled successfully!!!"
      # keep the container alive so logs stay visible
      tail -f /dev/null

###############################################################################
# Services
###############################################################################
services:
  # ──────────────── PostgreSQL ────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    networks: [ "demo" ]
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────── Ollama CPU/GPU ────────────────
  ollama-cpu:
    image: ollama/ollama:0.31.1
    pull_policy: missing
    container_name: ollama-cpu
    # dokploy-network too, so standalone Dokploy apps (e.g. Lakera Demo) can
    # reach Ollama by name at http://ollama-cpu:11434 — no host-IP hairpin,
    # no published port, works across redeploys.
    networks: [ "demo", "dokploy-network" ]
    restart: unless-stopped
    volumes:
      - ollama_storage:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
      # RAM guard: at most N models resident at once (CPU box, several 9B models).
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
    healthcheck:
      test: [ "CMD-SHELL", "ollama list >/dev/null 2>&1" ]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama-gpu:
    profiles: [ "gpu-nvidia" ]
    <<: *service-ollama
    container_name: ollama-gpu
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
      # RAM guard: at most N models resident at once (CPU box, several 9B models).
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  # ──────────────── Ollama Model Pullers ────────────────
  ollama-pull-models-cpu:
    image: ollama/ollama:0.31.1
    pull_policy: missing
    container_name: ollama-pull-models-cpu
    networks: [ "demo" ]
    volumes:
      - ollama_storage:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama-cpu:11434
    depends_on:
      # let it start, the script will wait in a loop
      - ollama-cpu
    entrypoint: /bin/sh
    command:
      - -lc
      - |
        echo ">> Waiting for Ollama at $${OLLAMA_HOST} ..."
        # loop until Ollama answers
        until OLLAMA_HOST="$${OLLAMA_HOST}" ollama list >/dev/null 2>&1; do
          echo "  ...still waiting for Ollama ($${OLLAMA_HOST})"
          sleep 3
        done
        # Model list comes from OLLAMA_MODELS in the env (comma-separated).
        MODELS="${OLLAMA_MODELS:-gemma4:e2b,qwen3.5:4b}"
        echo "Ollama is up. Pulling: $${MODELS}"
        for m in $$(echo "$${MODELS}" | tr ',' ' '); do
          echo ">> pulling $${m}"
          OLLAMA_HOST="$${OLLAMA_HOST}" ollama pull "$${m}" || echo "WARN: pull failed for $${m} (continuing)"
        done
        echo "All models pulled!!!"
        # keep the container alive so logs stay visible
        tail -f /dev/null

  ollama-pull-models-gpu:
    profiles: [ "gpu-nvidia" ]
    <<: *init-ollama
    container_name: ollama-pull-models-gpu
    environment:
      - OLLAMA_HOST=http://ollama-gpu:11434
    depends_on:
      ollama-gpu:
        condition: service_healthy

  # ──────────────── n8n ────────────────
  n8n:
    <<: *service-n8n
    container_name: n8n
    build:
      context: ./docker/n8n
      dockerfile: Dockerfile
    image: custom-mcp-n8n:custom
    restart: unless-stopped
    networks:
      - demo
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/backup:/backup
      - ./n8n/shared:/data/shared
      - ./n8n/custom-nodes:/home/node/.n8n/custom
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ──────────────── n8n PROVISIONER (owner + login + MCP install) ────────────────
  n8n-provision:
    image: curlimages/curl:8.9.1
    container_name: n8n-provision
    networks: [ "demo" ]
    depends_on:
      n8n:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    environment:
      # n8n from inside the network
      - N8N_URL=http://n8n:5678
      # owner info (must match what you want in n8n)
      - N8N_ADMIN_EMAIL=${N8N_ADMIN_EMAIL}
      - N8N_ADMIN_FIRST_NAME=${N8N_ADMIN_FIRST_NAME}
      - N8N_ADMIN_LAST_NAME=${N8N_ADMIN_LAST_NAME}
      - N8N_ADMIN_PASSWORD=${N8N_ADMIN_PASSWORD}
      # package to install — none by default: the workflows use n8n's native
      # MCP Client Tool node. Uncomment to install a community package again.
      # - N8N_COMMUNITY_PACKAGE=n8n-nodes-mcp
      # must match n8n basic auth above
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
    command: [ "sh", "/scripts/n8n-provision.sh" ]
    restart: "no"

  # ──────────────── n8n Import Utility ────────────────
  n8n-import:
    image: n8nio/n8n:2.28.6
    container_name: n8n-import
    networks: [ "demo" ]
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        echo "Waiting for Postgres..."
        until nc -z -w 3 postgres 5432; do
          echo "Postgres not ready, waiting..."
          sleep 3
        done

        echo "Waiting for n8n..."
        until nc -z -w 3 n8n 5678; do
          echo "n8n not ready, waiting..."
          sleep 5
        done

        echo "Preparing credentials (injecting secrets from env, keeping them out of git)..."
        # The committed credential backups carry placeholders, never real secrets
        # (this repo is public). Copy to a writable temp dir and substitute the
        # real values from .env at import time. Escape sed-special chars in the
        # password so any password is safe.
        # $$ escapes compose interpolation so these are evaluated by the
        # container shell (not substituted at compose-parse time).
        cp -r /backup /tmp/import
        ESCAPED_PG=$$(printf '%s' "$$POSTGRES_PASSWORD" | sed -e 's/[\/&|]/\\&/g')
        sed -i "s|__POSTGRES_PASSWORD__|$$ESCAPED_PG|g" /tmp/import/credentials_public/postgres.json

        # PolicyPilot + DevHub agent MCP bearer tokens (same placeholder pattern).
        # If a token env is empty, DROP that credential file so a broken (still
        # placeholder) credential is never imported, and warn instead.
        if [ -n "$$PILOT_MCP_TOKEN" ]; then
          ESCAPED_PILOT=$$(printf '%s' "$$PILOT_MCP_TOKEN" | sed -e 's/[\/&|]/\\&/g')
          sed -i "s|__PILOT_MCP_TOKEN__|$$ESCAPED_PILOT|g" /tmp/import/credentials_public/policypilot-bearer.json
        else
          echo "WARNING: PILOT_MCP_TOKEN is empty — skipping the PolicyPilot bearer credential (the PolicyPilot agent won't authenticate until an mcp key is set)."
          rm -f /tmp/import/credentials_public/policypilot-bearer.json
        fi
        if [ -n "$$DEVHUB_MCP_TOKEN" ]; then
          ESCAPED_DEVHUB=$$(printf '%s' "$$DEVHUB_MCP_TOKEN" | sed -e 's/[\/&|]/\\&/g')
          sed -i "s|__DEVHUB_MCP_TOKEN__|$$ESCAPED_DEVHUB|g" /tmp/import/credentials_public/devhub-bearer.json
        else
          echo "WARNING: DEVHUB_MCP_TOKEN is empty — skipping the DevHub bearer credential (the DevHub agent won't authenticate until an API key is set)."
          rm -f /tmp/import/credentials_public/devhub-bearer.json
        fi

        # MCP Gateway bearer (native MCP Client Tool auth for the *-via-gateway
        # agents). MCP_GATEWAY_TOKEN always has a compose default, so this
        # substitution always lands.
        ESCAPED_GW=$$(printf '%s' "$$MCP_GATEWAY_TOKEN" | sed -e 's/[\/&|]/\\&/g')
        sed -i "s|__MCP_GATEWAY_TOKEN__|$$ESCAPED_GW|g" /tmp/import/credentials_public/gateway-bearer.json

        # LLM provider keys (bring-your-own). Substitute each placeholder when
        # the key is supplied; otherwise keep the credential importable with its
        # placeholder and warn — the operator fills it in the n8n UI later. The
        # credential is NOT dropped because every agent workflow references it.
        subst_llm_key() {
          VAR_NAME="$$1"; VAR_VALUE="$$2"; CRED_FILE="$$3"
          if [ -n "$$VAR_VALUE" ]; then
            ESCAPED=$$(printf '%s' "$$VAR_VALUE" | sed -e 's/[\/&|]/\\&/g')
            sed -i "s|__$${VAR_NAME}__|$$ESCAPED|g" "/tmp/import/credentials_public/$$CRED_FILE"
          else
            echo "WARNING: $$VAR_NAME is empty — the matching n8n credential imports with a placeholder key; set it in the n8n UI (or .env + re-import) to use that model."
          fi
        }
        # The OpenAI + Azure credentials point at the internal LiteLLM proxy
        # (http://litellm:4000) so every n8n LLM call is traced to Langfuse;
        # LiteLLM holds the real provider keys server-side. Only the proxy's
        # master key is substituted here — it always has a compose default.
        subst_llm_key LITELLM_MASTER_KEY "$$LITELLM_MASTER_KEY" "openai.json"
        subst_llm_key LITELLM_MASTER_KEY "$$LITELLM_MASTER_KEY" "azure-OpenAI.json"
        subst_llm_key GEMINI_API_KEY "$$GEMINI_API_KEY" "Google Gemini(PaLM) Api account.json"
        subst_llm_key ANTHROPIC_API_KEY "$$ANTHROPIC_API_KEY" "anthropic.json"

        # Integration credentials — same pattern: set the env once (answers.env /
        # .env, persisted across redeploys) and every deploy injects it into the
        # imported n8n credential; never hand-edit creds in the n8n UI.
        subst_llm_key LAKERA_API_KEY "$$LAKERA_API_KEY" "Lakera.json"
        subst_llm_key IDP_SCIM_TOKEN "$$IDP_SCIM_TOKEN" "CP-SCIM-IdP-Token.json"
        subst_llm_key QDRANT_API_KEY "$$QDRANT_API_KEY" "quadrant.json"

        # Rewrite the domain placeholder in the agent workflows to the real
        # deployment domain, so each MCP endpoint URL (policypilot.<domain>/mcp,
        # hub.<domain>/api/mcp) is correct on a fresh deploy. Prefer an explicit
        # DOMAIN; otherwise derive it from N8N_HOST (n8n.<domain> -> <domain>).
        DOMAIN_VALUE="$$DOMAIN"
        if [ -z "$$DOMAIN_VALUE" ]; then
          DOMAIN_VALUE=$$(printf '%s' "$$N8N_HOST" | sed -e 's/^n8n\.//')
        fi
        # Assemble the double-brace DOMAIN token from parts so this compose file
        # never contains the literal token — the deploy-time templating that fills
        # the Traefik domain labels would otherwise rewrite this pattern too. The
        # mounted workflow JSONs are not compose text, so they keep the placeholder
        # until this step resolves it.
        OB='{'; CB='}'
        DOMAIN_PH="$${OB}$${OB}DOMAIN$${CB}$${CB}"
        if [ -n "$$DOMAIN_VALUE" ]; then
          ESCAPED_DOMAIN=$$(printf '%s' "$$DOMAIN_VALUE" | sed -e 's/[\/&|]/\\&/g')
          # Resolve {{DOMAIN}} in EVERY workflow (PolicyPilot/DevHub MCP endpoints,
          # the Identity Provider (IdP) SCIM URL, and anything added later) — not just a hand-listed few.
          for wf in /tmp/import/workflows/*.json; do
            sed -i "s|$$DOMAIN_PH|$$ESCAPED_DOMAIN|g" "$$wf"
          done
        else
          echo "WARNING: neither DOMAIN nor N8N_HOST is set — agent MCP endpoint URLs keep the unresolved domain placeholder."
        fi

        # (Lakera project id is intentionally NOT sent by the guard workflows —
        # the Lakera key is project-scoped, so Guard uses the key's own project.
        # LAKERA_PROJECT_ID is still passed to apps that need it, e.g. the
        # AI Guardrails demo.)

        echo "Importing n8n credentials & workflows..."
        n8n import:credentials --separate --input=/tmp/import/credentials_public && \
        n8n import:workflow --separate --input=/tmp/import/workflows

        echo "N8N Import completed!!!"

    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      # available to the credential-injection step in command: above
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # agent MCP bearer tokens + the deployment domain, consumed by the
      # credential-injection / workflow-domain step in command: above. Empty is
      # tolerated (the step warns and skips), so this stays a no-op until the
      # installer bootstrap provides the tokens. DOMAIN falls back to N8N_HOST
      # (n8n.<domain>) when unset.
      - PILOT_MCP_TOKEN=${PILOT_MCP_TOKEN:-}
      - DEVHUB_MCP_TOKEN=${DEVHUB_MCP_TOKEN:-}
      # gateway bearer for the *-via-gateway agents (native MCP node auth)
      - MCP_GATEWAY_TOKEN=${MCP_GATEWAY_TOKEN:-cp-mcp-gateway-training-token}
      # bring-your-own LLM keys — land in the imported n8n credentials so the
      # model row works on a fresh deploy without hand-editing credentials.
      # (OpenAI + Azure route via the LiteLLM proxy — see litellm service — so
      # those two credentials carry the proxy master key, not provider keys.)
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-cp-litellm-training-key}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # integration creds (set once, injected every deploy)
      - LAKERA_API_KEY=${LAKERA_API_KEY:-}
      - LAKERA_PROJECT_ID=${LAKERA_PROJECT_ID:-}
      - IDP_SCIM_TOKEN=${IDP_SCIM_TOKEN:-}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - DOMAIN=${DOMAIN:-}
      - N8N_HOST=${N8N_HOST}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_USER_MANAGEMENT_DISABLED=false
    volumes:
      - ./n8n/backup:/backup
      - ./n8n/custom-nodes:/home/node/.n8n/custom
      - n8n_storage:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_started
      n8n:
        condition: service_started
      n8n-provision:
        condition: service_completed_successfully
    restart: "no"

  # ──────────────── Flowise ────────────────
  flowise:
    # pinned by digest (was floating :latest) — flowise has no stable version tag here
    image: flowiseai/flowise@sha256:85038c3b0c71e30c41408e9ef8fd76fa5d532b1bd3ca82aa35c8e0f62af79439
    pull_policy: missing
    container_name: flowise
    # dokploy-network lets Traefik reach it (like open-webui / n8n); demo is the
    # internal stack network. Routing lived in the Dokploy UI before — now it's here
    # so a fresh spin-up serves flowise.<domain> without manual setup.
    networks: [ "demo", "dokploy-network" ]
    restart: unless-stopped
    environment:
      - PORT=${FLOWISE_PORT}
      # Flowise's SSRF guard denies the whole private-IP range (incl. the
      # 172.16.0.0/12 Docker network) by default, which blocks the Custom MCP
      # node from reaching the internal MCP gateway (mcp-gateway:8080) with
      # "isDeniedIP: Access to this host is denied by policy". HTTP_DENY_LIST
      # can only ADD entries, so the only way to allow an internal host is to
      # disable the default deny list. Safe here: Flowise is internal-only
      # (behind Traefik auth) and the gateway lives on the private demo network.
      - HTTP_SECURITY_CHECK=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./flowise_data:/root/.flowise
    entrypoint: /bin/sh -c "sleep 5; flowise start"
    labels:
      # Flowise already permits iframe embedding, so it needs a route, not a
      # framing middleware. (Add a flowise-hubframe like n8n's only if a future
      # version starts sending X-Frame-Options.)
      - "traefik.enable=true"
      # Two explicit routers (same pattern as PolicyPilot): the Cloudflare tunnel fronts every
      # host to entrypoint web (:80), and a router carrying TLS config never matches plain HTTP —
      # Traefik 3.6 splits a web,websecure router and propagates certresolver onto BOTH, so the
      # single-router form 404s through the tunnel.
      - "traefik.http.routers.flowise-web.rule=Host(`flowise.{{DOMAIN}}`)"
      - "traefik.http.routers.flowise-web.entrypoints=web"
      - "traefik.http.routers.flowise-web.service=flowise-svc"
      - "traefik.http.routers.flowise-websecure.rule=Host(`flowise.{{DOMAIN}}`)"
      - "traefik.http.routers.flowise-websecure.entrypoints=websecure"
      - "traefik.http.routers.flowise-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.flowise-websecure.service=flowise-svc"
      - "traefik.http.services.flowise-svc.loadbalancer.server.port=${FLOWISE_PORT}"
      - "traefik.docker.network=dokploy-network"

  # ──────────────── Open WebUI ────────────────
  open-webui:
    # pinned by digest (was rolling :main) to the version running on the lab
    image: ghcr.io/open-webui/open-webui@sha256:a26effeb220e132482bf7e0560b3404843e7bc40d23051144e062960df8df6b0
    pull_policy: missing
    container_name: open-webui
    networks: [ "demo", "dokploy-network" ]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui:/app/backend/data
      - ./open-webui/pipes/n8n_pipe.py:/app/backend/data/pipes/n8n_pipe.py:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama-cpu:11434
      # Default model(s) for new users/chats — set via the agentic env.
      - DEFAULT_MODELS=${OPEN_WEBUI_DEFAULT_MODELS:-gemma4:e2b}

    labels:
      - "traefik.enable=true"
      # Two explicit routers (same pattern as PolicyPilot): the Cloudflare tunnel fronts every
      # host to entrypoint web (:80), and a router carrying TLS config never matches plain HTTP —
      # Traefik 3.6 splits a web,websecure router and propagates certresolver onto BOTH, so the
      # single-router form 404s through the tunnel.
      - "traefik.http.routers.open-webui-web.rule=Host(`chat.{{DOMAIN}}`)"
      - "traefik.http.routers.open-webui-web.entrypoints=web"
      - "traefik.http.routers.open-webui-web.service=open-webui-svc"
      - "traefik.http.routers.open-webui-websecure.rule=Host(`chat.{{DOMAIN}}`)"
      - "traefik.http.routers.open-webui-websecure.entrypoints=websecure"
      - "traefik.http.routers.open-webui-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.open-webui-websecure.service=open-webui-svc"
      - "traefik.http.services.open-webui-svc.loadbalancer.server.port=8080"
      - "traefik.docker.network=dokploy-network"

    depends_on:
      - ollama-pull-models-cpu

  # ──────────────── Langflow ────────────────
  langflow:
    # PINNED (not :latest) — CVE-2026-33017 (unauth RCE) compromised this host on a
    # pre-1.9 build (see the ubuntu-dokploy-ai incident report); 1.10.1 is patched.
    # Bump this deliberately when a newer patched tag ships — don't float on :latest.
    image: langflowai/langflow:1.10.1
    container_name: langflow
    # dokploy-network lets Traefik reach it (like open-webui / aig); demo is the
    # internal stack network. Previously demo-only, so Traefik had no route → 404.
    networks: [ "demo", "dokploy-network" ]
    restart: unless-stopped
    environment:
      # Auth ON by default now that Langflow is publicly routed (Traefik below).
      # The superuser is provisioned from the stack admin creds already in the env
      # — no hardcoded secret, and it boots cleanly. For a deliberate no-auth demo,
      # explicitly set LANGFLOW_AUTO_LOGIN=true.
      - LANGFLOW_AUTO_LOGIN=${LANGFLOW_AUTO_LOGIN:-false}
      - LANGFLOW_SUPERUSER=${N8N_ADMIN_EMAIL}
      - LANGFLOW_SUPERUSER_PASSWORD=${N8N_ADMIN_PASSWORD}
      # ── Langfuse tracing (added) ──
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=http://langfuse:3000
    volumes:
      - ./langflow/flows:/app/flows
    depends_on:
      - ollama-pull-models-cpu
    labels:
      - "traefik.enable=true"
      # Two explicit routers (same pattern as PolicyPilot): the Cloudflare tunnel fronts every
      # host to entrypoint web (:80), and a router carrying TLS config never matches plain HTTP —
      # Traefik 3.6 splits a web,websecure router and propagates certresolver onto BOTH, so the
      # single-router form 404s through the tunnel.
      - "traefik.http.routers.langflow-web.rule=Host(`langflow.{{DOMAIN}}`)"
      - "traefik.http.routers.langflow-web.entrypoints=web"
      - "traefik.http.routers.langflow-web.service=langflow-svc"
      - "traefik.http.routers.langflow-websecure.rule=Host(`langflow.{{DOMAIN}}`)"
      - "traefik.http.routers.langflow-websecure.entrypoints=websecure"
      - "traefik.http.routers.langflow-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.langflow-websecure.service=langflow-svc"
      - "traefik.http.services.langflow-svc.loadbalancer.server.port=7860"
      - "traefik.docker.network=dokploy-network"
      # Let the dev-hub desktop embed Langflow in an iframe (strip X-Frame-Options,
      # allow the hub in frame-ancestors).
      - "traefik.http.routers.langflow.middlewares=langflow-hubframe"
      - "traefik.http.middlewares.langflow-hubframe.headers.customresponseheaders.X-Frame-Options="
      - "traefik.http.middlewares.langflow-hubframe.headers.customresponseheaders.Content-Security-Policy=frame-ancestors 'self' https://hub.{{DOMAIN}} https://*.{{DOMAIN}}"

  # ──────────────── Langfuse DB bootstrap (one-shot) ────────────────
  # Creates a dedicated `langfuse` database inside the stack Postgres if it
  # doesn't exist yet. Idempotent; exits 0 on reruns. Uses the already-pulled
  # postgres:16-alpine image, so no extra pull. Skip this service entirely if
  # LANGFUSE_DATABASE_URL points at a Postgres where the DB already exists.
  langfuse-db-init:
    image: postgres:16-alpine
    container_name: langfuse-db-init
    networks: [ "demo" ]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
    entrypoint: /bin/sh
    command:
      - -lc
      - |
        echo ">> Ensuring 'langfuse' database exists ..."
        psql -h postgres -U "$${POSTGRES_USER}" -tc \
          "SELECT 1 FROM pg_database WHERE datname='langfuse'" | grep -q 1 \
          || psql -h postgres -U "$${POSTGRES_USER}" -c "CREATE DATABASE langfuse"
        echo ">> Done."

  # ──────────────── Langfuse (LLM observability / tracing) ────────────────
  langfuse:
    # v2 line — single Postgres-backed container. Pinned to the v2 major; bump to
    # a specific patch (e.g. langfuse/langfuse:2.95.4) for full reproducibility.
    image: langfuse/langfuse:2
    container_name: langfuse
    # demo = internal stack net (Langflow/Flowise reach http://langfuse:3000 here);
    # dokploy-network = Traefik can route trace.<domain> to it.
    networks: [ "demo", "dokploy-network" ]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      langfuse-db-init:
        condition: service_completed_successfully
    environment:
      # Build the URL HERE (compose expands nested ${} in a file default) — a bare
      # LANGFUSE_DATABASE_URL=postgresql://${POSTGRES_USER}... in .env would NOT be
      # re-expanded (compose doesn't recurse into .env values). Set LANGFUSE_DATABASE_URL
      # to a full URL only to point at a different Postgres.
      - DATABASE_URL=${LANGFUSE_DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langfuse}
      - NEXTAUTH_URL=https://trace.{{DOMAIN}}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - SALT=${SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      # MUST bind all interfaces or Traefik can't reach it (default is localhost).
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - TELEMETRY_ENABLED=${LANGFUSE_TELEMETRY_ENABLED:-false}
      # ── Optional headless bootstrap: create org/project/user + API keys on
      # first boot so the builders' keys work with NO manual UI step. Safe to
      # omit — if you leave these out, create the project in the UI instead.
      - LANGFUSE_INIT_ORG_ID=cp-playground
      - LANGFUSE_INIT_ORG_NAME=Check Point Playground
      - LANGFUSE_INIT_PROJECT_ID=agents
      - LANGFUSE_INIT_PROJECT_NAME=Agents
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_INIT_USER_EMAIL=${N8N_ADMIN_EMAIL}
      - LANGFUSE_INIT_USER_NAME=${N8N_ADMIN_FIRST_NAME}
      - LANGFUSE_INIT_USER_PASSWORD=${N8N_ADMIN_PASSWORD}
    labels:
      - "traefik.enable=true"
      # Two explicit routers (same pattern as flowise/langflow/open-webui): the
      # Cloudflare tunnel fronts every host to entrypoint web (:80), and a router
      # carrying TLS config never matches plain HTTP — Traefik 3.6 splits a
      # web,websecure router and propagates certresolver onto BOTH, so the
      # single-router form 404s through the tunnel.
      - "traefik.http.routers.langfuse-web.rule=Host(`trace.{{DOMAIN}}`)"
      - "traefik.http.routers.langfuse-web.entrypoints=web"
      - "traefik.http.routers.langfuse-web.service=langfuse-svc"
      - "traefik.http.routers.langfuse-websecure.rule=Host(`trace.{{DOMAIN}}`)"
      - "traefik.http.routers.langfuse-websecure.entrypoints=websecure"
      - "traefik.http.routers.langfuse-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.langfuse-websecure.service=langfuse-svc"
      - "traefik.http.services.langfuse-svc.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"
      # Let the dev-hub desktop embed Langfuse in an iframe (strip X-Frame-Options,
      # allow the hub in frame-ancestors) — same trick as the langflow service.
      - "traefik.http.routers.langfuse-websecure.middlewares=langfuse-hubframe"
      - "traefik.http.middlewares.langfuse-hubframe.headers.customresponseheaders.X-Frame-Options="
      - "traefik.http.middlewares.langfuse-hubframe.headers.customresponseheaders.Content-Security-Policy=frame-ancestors 'self' https://hub.{{DOMAIN}} https://*.{{DOMAIN}}"

  # ─────────── Documentation MCP over HTTP ───────────
  mcp-documentation:
    image: custom-mcp-n8n:custom
    container_name: mcp-documentation
    networks: [ "demo" ]
    depends_on:
      - n8n
    entrypoint: [ "/usr/local/bin/mcp-documentation" ]
    environment:
      - CLIENT_ID=${DOC_CLIENT_ID}
      - SECRET_KEY=${DOC_SECRET_KEY}
      - REGION=${DOC_REGION}
    command:
      - "--transport"
      - "http"
      - "--transport-port"
      - "3000"
    # Lets the MCP gateway wait for a LISTENING server: the gateway enumerates
    # tools once at startup, and a sidecar that isn't up yet is silently dropped
    # (0 tools) until the gateway restarts.
    healthcheck:
      test: [ "CMD", "node", "-e", "require('net').connect(3000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    restart: unless-stopped

