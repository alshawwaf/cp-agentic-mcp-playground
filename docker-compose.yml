  # mcp-quantum-management (resolve layer/rule names) and with PolicyPilot's cleanup rail.
  # Needs Management API v2.1 (R82.10+) and Policy Insights enabled on the SMS.
  policy-insights-mcp:
    image: custom-mcp-n8n:custom
    container_name: policy-insights-mcp
    networks: [ "demo" ]
    depends_on:
      - n8n
    entrypoint: [ "/usr/local/bin/policy-insights-mcp" ]
    environment:
      - MANAGEMENT_HOST=${MANAGEMENT_HOST}
      - API_KEY=${MANAGEMENT_API_KEY}
    command:
      - "--transport"
      - "http"
      - "--transport-port"
      - "3013"
    # Registered in the gateway catalog: the gateway enumerates tools once at startup, so it must
    # only start after this server accepts connections (see the gateway's depends_on).
    healthcheck:
      test: [ "CMD", "node", "-e", "require('net').connect(3013,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))" ]
