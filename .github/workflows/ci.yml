name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Required gate — fast, deterministic, no secrets needed. This is what blocks a
  # merge: the setup wizard runs unattended, the compose file is valid, and the
  # custom MCP image (incl. the gateway-ready patches) builds.
  validate:
    name: Validate (setup + compose config + build)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate .env (non-interactive)
        run: ./setup.sh --non-interactive

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Build custom n8n / MCP image
        run: docker compose build n8n

  # Heavyweight live-stack smoke test. NOT a merge gate: bringing up the full
  # stack pulls large images and the management-backed MCP sidecars need a real
  # Check Point SMS (secrets) to be fully healthy, which a public runner does not
  # have. Run on demand (Actions -> CI -> Run workflow) or against the lab.
  live-stack:
    name: Live stack smoke (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate .env (non-interactive)
        run: ./setup.sh --non-interactive

      - name: Start stack (CPU profile)
        run: docker compose --profile cpu up -d
        env:
          COMPOSE_HTTP_TIMEOUT: 200

      - name: Wait for services to initialize
        run: sleep 90

      - name: Run health checks (in-network, validated smoke test)
        run: ./scripts/health-check.sh --profile cpu --verbose

      - name: Show compose logs on failure
        if: failure()
        run: docker compose --profile cpu logs --tail 150
