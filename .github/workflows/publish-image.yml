name: publish-image
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # n8n custom image (custom-mcp-n8n:custom) — also reused as-is by all
          # 14 MCP sidecar services in docker-compose.yml, so this one image
          # covers n8n + every sidecar.
          - { image: cp-agentic-n8n, context: ./docker/n8n, dockerfile: ./docker/n8n/Dockerfile }
          # AI-Infra-Guard builds from Tencent's repo (remote git build context,
          # dockerfile path resolved inside that context) — same as compose.
          - { image: cp-agentic-aig-webserver, context: "https://github.com/Tencent/AI-Infra-Guard.git", dockerfile: Dockerfile }
          - { image: cp-agentic-aig-agent, context: "https://github.com/Tencent/AI-Infra-Guard.git", dockerfile: Dockerfile_Agent }
          # Build-your-own-MCP exercise image (ips-cve-mcp:exercise)
          - { image: cp-agentic-ips-cve-mcp, context: ./exercises/build-your-own-mcp, dockerfile: ./exercises/build-your-own-mcp/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
